<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="description" content="Discover Eden House, Dubai's collection of refined design-led residences. Luxury apartments, penthouses &#38; villas across">
    <meta property="og:title" content="Eden Hills Dubai | Exclusive Villa Community">

    <title>Eden Hills Dubai | Exclusive Villa Community</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uikit@3.25.17/dist/css/uikit.min.css"/>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>
<body>


<!-------------------.section ---------------------------------->
<div id="pagehero" class="uk-position-relative uk-light">

    <!-- Hero Image -->
    <img
        src="camera-man-villa-balbiano-6154200.jpg"
        alt=""
        width="1920"
        height="1080"
        uk-img="loading: eager"
    >

    <!-- Navbar -->
    <div class="uk-position-top">
        <nav class="uk-navbar-container uk-navbar-transparent" uk-navbar>
            <div class="uk-container uk-container-expand">

                <div class="uk-navbar-left"></div>

                <div class="uk-navbar-center">
                    <a class="uk-navbar-item uk-logo" href="#">
                        <img src="favicon.svg" alt="Eden Hills Dubai Logo">
                    </a>
                </div>

                <div class="uk-navbar-right">
                    <a class="uk-button uk-button-secondary" href="#enquiry">
                        Make enquiry
                    </a>
                </div>

            </div>
        </nav>
    </div>

    <!-- Hero Content -->
    <div class="uk-position-cover uk-flex uk-flex-center uk-flex-middle uk-text-center">

        <div class="uk-container">

            <h1 class="uk-heading-medium">
                Exceptional Private Estate Living,<br class="uk-visible@l">
                90 minutes from Paris
            </h1>

            <div class="uk-width-3-5@m uk-margin-auto">
                <p>
                    52 three- to seven-bedroom residences within the 1,400 acre Les Bordes Estate...
                </p>

                <p>
                    Residences from €2,990,000
                </p>
            </div>

            <div class="uk-margin-large-top">
                <a class="uk-button uk-button-secondary" href="#enquiry" uk-scroll>
                    Make an enquiry
                </a>
            </div>

        </div>

    </div>

</div>
		<!-------------------.section ---------------------------------->

<script src="https://cdn.jsdelivr.net/npm/uikit@3.25.17/dist/js/uikit.min.js"></script>
