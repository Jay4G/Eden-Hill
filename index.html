<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Discover Eden House, Dubai's collection of refined design-led residences. Luxury apartments, penthouses &#38; villas across">
    <meta property="og:title" content="Eden Hills Dubai | Exclusive Villa Community">
    <meta property="og:description" content="Discover Eden House, Dubai's collection of refined design-led residences. Luxury apartments,penthouses &#38; villas across">

    <title>Eden Hills Dubai | Exclusive Villa Community</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uikit@3.25.17/dist/css/uikit.min.css"/>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>
<body>


<!-------------------.section ---------------------------------->
<div id="pagehero" class="hero-section uk-section uk-background-cover uk-background-center-center uk-position-relative uk-flex uk-flex-center uk-flex-middle"
    data-src="camera-man-villa-balbiano-6154200.jpg"
    sizes="100vw" 
    uk-img="loading: eager">

    <!-- NAVBAR -->
    <nav class="uk-navbar-container uk-navbar-transparent hero-navbar"
         uk-navbar
         uk-sticky="animation: uk-animation-slide-top; sel-target: .uk-navbar-container">

        <div class="uk-container uk-container-expand">

            <div class="uk-navbar-left"></div>

            <div class="uk-navbar-center">
                <a class="uk-navbar-item uk-logo" href="#">
                    <img src="favicon.svg" alt="Eden Hills Dubai Logo">
                </a>
            </div>

            <div class="uk-navbar-right">
                <a class="uk-button uk-button-secondary" href="#enquiry">
                    Make enquiry
                </a>
            </div>

        </div>
    </nav>

    <!-- TOP OVERLAY -->
    <div class="uk-position-top top-overlay"></div>

    <!-- HERO CONTENT -->
    <div class="uk-width-1-1 uk-position-relative">
        <div class="uk-container">

            <div class="main-caption uk-text-center uk-flex uk-flex-center">
                <div class="content banner-caption">

                    <div class="uk-light"
                         uk-scrollspy="cls: uk-animation-slide-bottom-small; target: .animateInitState; delay: 200; repeat: true"
                         uk-margin="margin: uk-margin-top">

                        <h1 class="main-title animateInitState uk-margin-remove">
                            Exceptional Private Estate Living, <br class="uk-visible@l">90 minutes from Paris
                        </h1>

                        <div class="subheading animateInitState uk-width-4-5@m uk-margin-auto">
                            <p>52 three- to seven-bedroom residences within the 1,400 acre Les Bordes Estate...</p>
                            <p>Residences from €2,990,000</p>
                        </div>

                        <div class="hero-cta uk-width-1-1 animateInitState">
                            <div>
                                <a class="uk-button uk-button-secondary" href="#enquiry" uk-scroll>
                                    Make an enquiry
                                </a>
                            </div>
                        </div>

                    </div>

                </div>
            </div>

        </div>
    </div>

</div>
		<!-------------------.section ---------------------------------->


<!-- UIkit JS -->
<script src="https://cdn.jsdelivr.net/npm/uikit@3.25.17/dist/js/uikit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/uikit@3.25.17/dist/js/uikit-icons.min.js"></script>
</body>
</html>
